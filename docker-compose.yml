version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: guardian-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: guardiangate
      POSTGRES_USER: ggadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super_secret_pg_password_change_in_production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - guardian-network

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: guardian-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ggadmin:${POSTGRES_PASSWORD:-super_secret_pg_password_change_in_production}@postgres:5432/guardiangate?schema=public
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      - QR_SECRET=${QR_SECRET:-qr_signing_secret_key_change_in_production}
    depends_on:
      - postgres
    networks:
      - guardian-network

volumes:
  postgres-data:
    driver: local

networks:
  guardian-network:
    driver: bridge
