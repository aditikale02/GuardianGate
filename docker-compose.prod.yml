version: "3.8"

# Production Docker Compose Configuration
# Use this for production deployments with optimized settings

services:
  postgres:
    image: postgres:16-alpine
    container_name: guardian-postgres-prod
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=guardiangate
      - POSTGRES_USER=ggadmin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - guardian-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggadmin -d guardiangate"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: guardian-api-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ggadmin:${POSTGRES_PASSWORD}@postgres:5432/guardiangate?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - QR_SECRET=${QR_SECRET}
      - ENABLE_ADMIN_SIGNUP=false
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SOCKET_CORS_ORIGINS=${SOCKET_CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guardian-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data-prod:
    driver: local

networks:
  guardian-network:
    driver: bridge
